<!DOCTYPE html>
<html>
<head>
    <title>Student Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center mb-4">Quản lý sinh viên</h2>

    <div class="card p-3 mb-3">
        <input id="name" class="form-control mb-2" placeholder="Tên">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="age" class="form-control mb-2" placeholder="Tuổi">
        <input id="class" class="form-control mb-2" placeholder="Lớp">
        <button onclick="addStudent()" class="btn btn-primary">Thêm</button>
    </div>

    <ul id="list" class="list-group"></ul>
</div>

<script>
async function addStudent() {
    await fetch('/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name: name.value,
            email: email.value,
            age: Number(age.value),
            class: class.value
        })
    });
    load();
}

async function load() {
    const res = await fetch('/students');
    const data = await res.json();

    list.innerHTML = data.data.map(s => `
        <li class="list-group-item">
            ${s.name} - ${s.email}
        </li>
    `).join('');
}

load();
</script>
</body>
</html>
